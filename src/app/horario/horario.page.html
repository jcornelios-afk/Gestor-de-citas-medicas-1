<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="volver()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Seleccionar Horario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="horario-content">

  <div class="info-medico">
    <span class="medico-nombre">{{ medico?.nombre }}</span>
    <span class="medico-especialidad">{{ especialidad?.nombre }}</span>
  </div>

  <div class="calendario">
    <div class="mes-header">
      <ion-icon name="chevron-back-outline"></ion-icon>
      <span class="mes-texto">{{ mesActual }}</span>
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </div>

    <div class="dias-semana">
      <span class="dia-semana" *ngFor="let dia of diasSemana">{{ dia }}</span>
    </div>

    <div class="dias-numeros">
      <div 
        class="dia-numero" 
        *ngFor="let dia of diasNumeros"
        [class.seleccionado]="dia === diaSeleccionado"
        [class.no-disponible]="esDiaNoDisponible(dia)"
        (click)="seleccionarDia(dia)">
        <span>{{ dia }}</span>
        <span class="dia-etiqueta" *ngIf="esDiaNoDisponible(dia)">No</span>
      </div>
    </div>

    <div class="leyenda">
      <div class="leyenda-item">
        <div class="punto disponible"></div>
        <span>Disponible</span>
      </div>
      <div class="leyenda-item">
        <div class="punto no-disponible"></div>
        <span>No disponible</span>
      </div>
      <div class="leyenda-item">
        <div class="punto seleccionado"></div>
        <span>Seleccionado</span>
      </div>
    </div>
  </div>

  <div class="horarios" *ngIf="diaSeleccionado">
    <div class="turno">
      <span class="turno-titulo">
        <ion-icon name="sunny-outline"></ion-icon>
        Mañana
      </span>
      <div class="horas-grid">
        <div 
          class="hora-item" 
          *ngFor="let hora of horasManana"
          [class.seleccionada]="hora === horaSeleccionada"
          [class.ocupada]="esHoraOcupada(hora, 'manana')"
          (click)="!esHoraOcupada(hora, 'manana') && seleccionarHora(hora)">
          <span>{{ hora }}</span>
          <span class="hora-estado" *ngIf="esHoraOcupada(hora, 'manana')">Ocupado</span>
          <span class="hora-estado disponible-text" *ngIf="!esHoraOcupada(hora, 'manana')">Libre</span>
        </div>
      </div>
    </div>

    <div class="turno">
      <span class="turno-titulo">
        <ion-icon name="moon-outline"></ion-icon>
        Tarde
      </span>
      <div class="horas-grid">
        <div 
          class="hora-item" 
          *ngFor="let hora of horasTarde"
          [class.seleccionada]="hora === horaSeleccionada"
          [class.ocupada]="esHoraOcupada(hora, 'tarde')"
          (click)="!esHoraOcupada(hora, 'tarde') && seleccionarHora(hora)">
          <span>{{ hora }}</span>
          <span class="hora-estado" *ngIf="esHoraOcupada(hora, 'tarde')">Ocupado</span>
          <span class="hora-estado disponible-text" *ngIf="!esHoraOcupada(hora, 'tarde')">Libre</span>
        </div>
      </div>
    </div>
  </div>

  <div class="sin-seleccion" *ngIf="!diaSeleccionado">
    <ion-icon name="calendar-outline"></ion-icon>
    <p>Selecciona un día disponible para ver los horarios</p>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button 
      expand="block" 
      class="boton-continuar"
      [disabled]="!horaSeleccionada"
      (click)="continuar()">
      Continuar
    </ion-button>
  </ion-toolbar>
</ion-footer>
